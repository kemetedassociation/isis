<!DOCTYPE html>
<html>
<body style="background:#080d1a;display:flex;gap:20px;padding:20px;flex-wrap:wrap">
<script>
function makeIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');

  // Fond
  ctx.fillStyle = '#080d1a';
  ctx.fillRect(0,0,size,size);

  const cx = size/2, cy = size/2, r = size*0.42;

  // Halo
  const halo = ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.5);
  halo.addColorStop(0,'rgba(0,200,255,0.15)');
  halo.addColorStop(1,'rgba(0,200,255,0)');
  ctx.beginPath(); ctx.arc(cx,cy,r*1.5,0,Math.PI*2);
  ctx.fillStyle = halo; ctx.fill();

  // Anneau extérieur
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle = 'rgba(0,200,255,0.6)';
  ctx.lineWidth = size*0.025; ctx.stroke();

  // Anneau intérieur
  ctx.beginPath(); ctx.arc(cx,cy,r*0.72,0,Math.PI*2);
  ctx.strokeStyle = 'rgba(0,200,255,0.35)';
  ctx.lineWidth = size*0.015; ctx.stroke();

  // Cercle central
  const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,r*0.45);
  grad.addColorStop(0,'rgba(0,200,255,0.9)');
  grad.addColorStop(0.5,'rgba(0,150,200,0.5)');
  grad.addColorStop(1,'rgba(0,100,150,0.1)');
  ctx.beginPath(); ctx.arc(cx,cy,r*0.45,0,Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();

  // Lettre I
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${size*0.32}px "Segoe UI", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = '#00c8ff';
  ctx.shadowBlur = size*0.08;
  ctx.fillText('I', cx, cy);

  return c;
}

[192, 512].forEach(size => {
  const c = makeIcon(size);
  c.style.borderRadius='20px';
  document.body.appendChild(c);
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = `icon-${size}.png`;
  a.textContent = `↓ Télécharger icon-${size}.png`;
  a.style.cssText = 'display:block;color:#00c8ff;margin:8px 0;font-family:sans-serif';
  document.body.appendChild(a);
});
</script>
</body>
</html>
